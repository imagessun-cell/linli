<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邻里 H5 - 社区养老服务预览页</title>
  <meta name="description" content="基于 Vue3 + Node.js + SQLite 的本地部署版社区养老服务平台预览页，采用高端机构视觉设计" />
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600&family=Geist:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #050505;
      --bg-glass: rgba(255, 255, 255, 0.04);
      --card-bg: #0a0a0a;
      --accent: #00c9a7;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
    }
    * {margin:0; padding:0; box-sizing:border-box;}
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: var(--bg-dark);
      background-image: radial-gradient(at 20% 20%, #222 0%, transparent 50%),
                        radial-gradient(at 80% 80%, #111 0%, transparent 50%);
      min-height: 100dvh;
      display:flex; justify-content:center; align-items:center;
      color: var(--text-primary);
      overflow:hidden;
    }
    .hero {
      position:absolute; inset:0; overflow:hidden; z-index:-1;
    }
    .hero::before {
      content:'';
      position:absolute; inset:0;
      background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCI+PHJlY3QgeD0iMCIgeT0iMCIgd2lkdGg9IjYwIiBoZWlnaHQ9IjYwIiBmaWxsPSIjMDAwMDAwIiBvcGFjaXR5PSIwLjA1Ii8+PHJlY3QgeD0iMTUiIHk9IjE1IiB3aWR0aD0iMzAiIGhlaWdodD0iMzAiIGZpbGw9IiMwMDM1MzMiIG9wYWNpdHk9IjAuMDciLz48L3N2Zz4=');
      background-size: 80px 80px;
      opacity:0.2;
      animation: float 12s linear infinite;
    }
    @keyframes float {
      0%{transform:translate(0,0) rotate(0deg);} 
      50%{transform:translate(10px,10px) rotate(5deg);} 
      100%{transform:translate(0,0) rotate(0deg);} 
    }
    .card-outer {
      background: var(--bg-glass);
      backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2rem;
      padding: 1.5px;
      display:flex; justify-content:center; align-items:center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-width: 900px;
      width: 90%;
    }
    .card-inner {
      background: var(--card-bg);
      border-radius: calc(2rem - 0.375rem);
      padding: 2.5rem 2rem;
      width: 100%;
      color: var(--text-primary);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.15), 0 4px 12px rgba(0,0,0,0.6);
      transform: translateY(0);
      animation: entrance 0.8s cubic-bezier(0.32,0.72,0,1) forwards;
    }
    @keyframes entrance {
      from {opacity:0; transform:translateY(30px) scale(0.98);} 
      to {opacity:1; transform:translateY(0) scale(1);}
    }
    h1 {
      font-family: 'Clash Display', serif;
      font-size: 2.8rem;
      margin-bottom: 0.8rem;
      background: linear-gradient(45deg, var(--accent), #ff6b6b);
      -webkit-background-clip: text; color: transparent;
    }
    p {margin-bottom:1rem; line-height:1.6; color: var(--text-secondary);}
    .cta {
      display:inline-flex; align-items:center; gap:0.5rem;
      background: var(--accent);
      color:#fff;
      padding:0.75rem 1.5rem;
      border-radius:9999px;
      text-decoration:none;
      font-weight:600;
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .cta:hover {
      transform:scale(0.98);
      background: #00a58c;
    }
    .cta .icon {
      background:#fff;
      color:var(--accent);
      width:1.8rem; height:1.8rem;
      display:flex; align-items:center; justify-content:center;
      border-radius:50%;
      transition: transform 0.3s ease;
    }
    .cta:hover .icon {transform:translateX(4px) scale(1.1);}
  </style>
</head>
<body>
  <div class="hero"></div>
  <div class="card-outer">
    <div class="card-inner">
      <h1>邻里 H5 - 社区养老服务</h1>
      <p>基于 Vue3 + Node.js + SQLite 的本地部署版社区养老服务平台，提供岗位广场、任务抢单、钱包提现等完整功能。</p>
      <a href="#" class="cta">
        立即体验
        <span class="icon">↗</span>
      </a>
    </div>
  </div>
</body>
</html>
